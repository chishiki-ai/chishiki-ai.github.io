- name: "Dibakar Roy Sarkar"
  school: "Johns Hopkins University"
  prj_title: "Safe AI-Enabled Real-Time Control of Hydraulic Fracturing via Neural Operator Surrogates and Spectral Safety Projection"
  summary: "My research focuses on building neural operator surrogate models for hydraulic fracturing and using them inside a differentiable predictive control framework to find the best pumping schedules in real time. A key part of the work is a spectral safety projection layer that gives the controller formal guarantees, so it can run much faster than traditional methods without trading off safety. The same approach can be extended to other PDE-governed civil engineering problems, such as dam seepage, ground deformation, and underground energy storage."
  q1: "I have always been curious about how things work and why they happen the way they do. Even as a kid, I would take things apart just to see what was inside. That same curiosity, applied to bigger questions, is what pushed me toward research. Becoming a scientist felt like the most natural way to keep asking those questions and actually try to answer them."
  q2: "My favorite part is the moment when I dig deep into a concept and notice something small that other people missed. It is a quiet kind of excitement, but it is what I look forward to the most. Often, that one detail opens up a new way of looking at the problem, and the work starts to feel like mine."
  q3: "AI is moving very fast, but most of the impressive results so far live in the digital world. Civil engineering is the opposite. The systems are physical, slow to build, and very hard to fix once something goes wrong. Bringing AI into this space is exciting because the stakes are real. A neural operator that runs in milliseconds can replace simulations that take hours, and a well-designed controller can help prevent serious issues like aquifer contamination or wellbore failure. I find it meaningful to work on something where better AI translates directly into safer infrastructure."
  q4: "I hope to build a complete, working version of my framework, from the neural operator surrogate to the safe controller, and release it openly so other researchers can use it. The HPC support from Chishiki AI matters a lot for this, since the GEOS simulations alone need a large amount of compute. I also want to use this time to learn from other fellows and faculty, share my work with people outside my immediate field, and publish in strong venues. If by the end of the fellowship, the methodology can be picked up and applied to other civil engineering problems like dam seepage or underground energy storage, I would consider it a real success."
  q5: "When I am not working on research, I like spending time with my friends and trying out new recipes in the kitchen. Cooking is my way of switching off. It is hands-on, the feedback is immediate, and there is no peer review."
  image: "/images/awardee/2026/dibakar.png"

- name: "Taiwo A. Adebiyi"
  school: "University of Houston"
  prj_title: "Trustworthy Adaptive Experimentation for Civil-Engineering Digital Twins"
  summary: "My research develops trustworthy AI methods for civil-engineering systems that must learn and make decisions under uncertainty. I focus on the problem of how engineering systems should decide what to simulate, measure, or reconstruct next when prediction, sensing, and model updating are tightly coupled but often treated separately. To address this, I combine Bayesian optimization, uncertainty-aware scientific foundation models, and digital-twin thinking to build adaptive systems that are not only informative, but reliable and useful for real engineering decisions."
  q1: "I became a scientist because I realized early that research and innovation are the foundation of resilient and prosperous societies. My path was shaped both by my civil-engineering background and by personal experience, including watching my father work as a foreman on construction sites and later seeing the realities of engineering practice for myself. Over time, what stayed with me most was the decision-making problem: how do we make better choices in complex, high-stakes settings where uncertainty is unavoidable? That is still what drives me. I want to solve problems that move from research into real value for engineering systems and the communities they serve."
  q2: "My favorite aspect of research is helping bring the most important technological advances of our time into civil engineering in a principled way. Civil engineering operates in complex and high-risk settings, but it has not always benefited quickly from new technologies. I enjoy working on methods that make modern AI and uncertainty quantification truly compatible with these settings. I especially enjoy releasing open-source tools, presenting my work at leading machine-learning venues, and teaching others about it, because those are the moments when research begins to move beyond papers and into broader impact."
  q3: "What excites me most is that AI opens the door to a more complete vision of digital twins in civil engineering systems that combine learning, fidelity, intelligence, and closed-loop decision-making. As the world begins to pay more attention to physical AI, I believe this is an especially important moment for civil engineering. My work has increasingly focused on adaptive and optimal experimental design, and I am excited by the possibility of using AI not just to model engineering systems, but to help them learn, adapt, and make better decisions in technically meaningful ways."
  q4: "During my time as a Chishiki AI Fellow, I hope to accelerate my research on trustworthy adaptive experimentation for civil-engineering digital twins. I want to deepen this work, expand its impact, and move it closer to the kind of reliable, closed-loop intelligence that can make a real difference in engineering practice. I am also excited about the opportunity to learn from mentors, collaborate with other fellows, and fully leverage advanced computing resources to pursue this research in a more ambitious and unhindered way."
  q5: "When I am not working on research, I enjoy church service and giving back to my community. I also like exploring the venture capital space, listening to diplomatic speeches, and watching a good football (soccer) game."
  image: "/images/awardee/2026/taiwo.png"

- name: "Melis Fidansoy"
  school: "University of California, Los Angeles"
  prj_title: "AI-SLIDE — An Artificial Intelligence Assisted Spatiotemporal Landslide and Debris-flow Risk Assessment Tool"
  summary: "My research develops AI-SLIDE, an artificial intelligence and cyberinfrastructure-enabled framework for modeling landslides and post-fire debris flows across space and time. The framework integrates large-scale geospatial data, synthetic rainfall generation, fragility modeling, and transportation network analysis to identify vulnerable road segments, estimate mobility disruptions, and support equitable infrastructure investment decisions. While my current focus is on landslides and debris flows, my long-term goal is to expand this framework into a broader AI-assisted decision-support platform for multiple natural hazards affecting civil infrastructure and community resilience."
  q1: "I became a scientist because I have always been motivated by the combination of analytical problem solving and community impact. Civil engineering research allows me to work on technically complex problems while also addressing real risks that affect people’s daily lives, mobility, safety, and access to essential services. I am also deeply passionate about asking research questions and developing tools that can help communities become more resilient to natural hazards."
  q2: "My favorite aspect of my research is that it connects advanced computational methods with real community needs. I am especially interested in how natural hazards affect transportation networks, because road closures can isolate communities, delay emergency response, and disproportionately impact underserved populations. Developing solutions to these challenges has the potential to directly benefit communities, and contributing to that process is one of the most meaningful parts of my work. I also value the collaborative nature of my research, where civil engineers, AI researchers, software developers, and transportation experts can exchange knowledge and build more practical, equitable solutions together."
  q3: "What excites me most is the opportunity to use AI not only as a modeling tool, but as a way to develop more robust, scalable, and actionable solutions for civil infrastructure problems. Natural hazards are complex, uncertain, and data-intensive, and AI can help us analyze large datasets, generate realistic hazard scenarios, quantify uncertainty, and support faster decision-making. For me, the intersection of AI and civil engineering is powerful because it can transform traditional infrastructure assessment into proactive, data-driven resilience planning."
  q4: "During my time as a Chishiki AI Fellow, I hope to strengthen my ability to develop AI-based decision-support tools that are both technically rigorous and useful for real infrastructure planning. I am especially excited to collaborate with researchers in high-performance computing, AI, and civil engineering to improve the scalability of my framework. My goal is to use this fellowship to advance my research into a more robust platform for transportation risk assessment, and equitable infrastructure decision-making."
  q5: "When I am not working on research, I enjoy swimming and spending time with my family."
  image: "/images/awardee/2026/melis.png"

