- name: "Sai Krishna"
  school: "University of Georgia"
  prj_title: "Collaborative Spatial Intelligence in Multi-Robot Systems for Civil Infrastructure"
  summary: "My research advances collaborative multi-robot systems that achieve resilient autonomy in complex, dynamic environments. I develop algorithms that enable robot teams to coordinate navigation, manipulation, perception, and decision making in the real world. My goal is to build trustworthy and scalable multi-robot teams for civil, domestic, and safety-critical applications, including search and rescue, infrastructure inspection, and disaster response."
  q1: "I do not think I am fully a scientist yet, but one day I want to feel like one. For me, becoming a scientist means earning the ability to ask difficult questions and build something that can genuinely help society. I have always wanted my work to contribute something meaningful beyond myself, and robotics felt like the right field because it is both challenging and full of possibility. People are often skeptical about whether robots can work reliably in the real world, and that skepticism motivates me. I believe I can contribute to this field, and my goal is to help make robotics more useful, trustworthy, and impactful."
  q2: "My favorite aspect of research is designing a system that can solve the problem. I enjoy this process because it depends on understanding the fundamentals, implementing the idea, analyzing the results, and then going back to improve the design. Research is never a straight path; it requires moving back and forth between theory, implementation, and evaluation. Among all of these steps, I find solution design the most exciting and critical, because it is where the main idea takes shape and becomes something that can eventually work in the real world."
  q3: "What excites me most about AI and Civil Engineering is the chance to work on problems that directly affect people and communities. AI and robotics can help with infrastructure inspection, disaster response, and search and rescue, especially in places that are risky or difficult for humans. I am excited by the possibility of building systems that are not only intelligent, but also useful in real world civil applications."
  q4: "As a Chishiki AI Fellow, I hope to grow as a researcher and strengthen my work in AI and multi-robot systems. I want to develop algorithms that make robot teams more reliable, scalable, and useful in complex environments. I also hope to learn from others, collaborate across disciplines, and contribute to research that can have real societal impact."
  q5: "When I am not doing research, I usually like spending time by myself and staying at home. I enjoy relaxing, watching Netflix, playing games, going outdoors sometimes, and just thinking. Even when I am taking a break, my thoughts often somehow connect back to research, ideas, or problems I want to solve. For me, research naturally becomes part of how I see things."
  image: "/images/awardee/2026/saikrishna.png"
